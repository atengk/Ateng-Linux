apiVersion: v1
kind: Service
metadata:
  name: vm-win10-ky
  namespace: kongyu-vm
spec:
  selector:
    kubevirt.io/vm: vm-win10-ky
  ports:
  - protocol: TCP
    port: 3389
    targetPort: 3389
    nodePort: 38100
  type: NodePort
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  labels:
    kubevirt.io/vm: vm-win10-ky
  name: vm-win10-ky
  namespace: kongyu-vm
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm-win10-ky
      annotations:
        "cni.projectcalico.org/ipAddrs": "[\"10.244.250.100\"]"
    spec:
      nodeSelector:
        kubernetes.io/hostname: server02.lingo.local
      domain:
        cpu:
          cores: 16
          model: host-passthrough
        memory:
          guest: 24Gi
        resources:
          overcommitGuestOverhead: true
        machine:
          type: q35
        devices:
          disks:
          - name: system
            disk:
              bus: virtio
          - name: data01
            disk:
              bus: virtio
          interfaces:
          - name: default
            bridge: {}
            #model: e1000
            #masquerade: {}
            ports:
             - name: rdp
               port: 3389
      terminationGracePeriodSeconds: 30
      networks:
      - name: default
        pod: {}
      volumes:
      - name: system
        dataVolume:
          name: vm-win10-ky-system
      - name: data01
        dataVolume:
          name: vm-win10-ky-data01
  dataVolumeTemplates:
  - metadata:
      name: vm-win10-ky-system
    spec:
      pvc:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 500Gi
        #storageClassName: "local"
      source:
        registry:
          url: "docker://swr.cn-north-1.myhuaweicloud.com/kongyu/kubevirt/windows:windows_10_business_21h2_2022_x64-01"
  - metadata:
      name: vm-win10-ky-data01
    spec:
      pvc:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 500Gi
        #storageClassName: "local"
      source:
        blank: {}
